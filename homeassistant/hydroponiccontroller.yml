interval:
  - interval: 5s
    then:
      - if:
          condition:
            lambda: |-
              return id(ef_scale_is_calibrating).state;
          then:
            - uart.write:
                data: !lambda |-
                  int calibrationFactor = (int) id(ef_calibration_factor).state;
                  std::string message = str_sprintf("CAL_FACTOR_EF_SCALE,%d\r\n", calibrationFactor);
                  return std::vector<uint8_t>(message.begin(), message.end());

  - interval: 5s
    then:
      - if:
          condition:
            lambda: |-
              return id(db_scale_is_calibrating).state;
          then:
            - uart.write:
                data: !lambda |-
                  int calibrationFactor = (int) id(db_calibration_factor).state;
                  std::string message = str_sprintf("CAL_FACTOR_DB_SCALE,%d\r\n", calibrationFactor);
                  return std::vector<uint8_t>(message.begin(), message.end());

  - interval: 5s
    then:
      - if:
          condition:
            lambda: |-
              return !id(ef_scale_is_calibrating).state && !id(db_scale_is_calibrating).state && !id(nutrient_pump_is_calibrating).state;
          then:
            - uart.write: "STATUS\r\n"

  - interval: 22s
    then:
      - if:
          condition:
            lambda: |-
              return !id(ef_scale_is_calibrating).state && !id(db_scale_is_calibrating).state && !id(nutrient_pump_is_calibrating).state;
          then:
            - uart.write:
                data: !lambda |-
                  int min_vol = (int) id(aux_reservoir_min_volume).state;
                  int max_vol = (int) id(aux_reservoir_max_volume).state;
                  int dosing_flora_grow = (int) id(dosing_flora_grow).state;
                  int dosing_flora_bloom = (int) id(dosing_flora_bloom).state;
                  int dosing_flora_micro = (int) id(dosing_flora_micro).state;
                  float dosing_ph = (float) id(dosing_ph).state;
                  std::string message = str_sprintf(
                    "CONFIG,%d,%d,%d,%d,%d,%f\r\n",
                    min_vol,
                    max_vol,
                    dosing_flora_grow,
                    dosing_flora_bloom,
                    dosing_flora_micro,
                    dosing_ph
                  );
                  return std::vector<uint8_t>(message.begin(), message.end());