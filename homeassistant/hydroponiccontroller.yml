esphome:
  name: hydroponiccontroller
  friendly_name: Hydroponic kontroller

esp8266:
  board: d1_mini
  enable_scanf_float: true

logger:
  level: DEBUG
  baud_rate: 0

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Mega-Bridge-D1 Fallback"
    password: "change-me-please"

captive_portal:

api:

globals:
  - id: last_alive_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'  
    
  - id: ef_valve_open
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: db_valve_open
    type: bool
    restore_value: yes
    initial_value: 'false'    
  
    
uart:
  id: arduino_mega_uart
  tx_pin: GPIO01   # TX
  rx_pin: GPIO03   # RX
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

  debug:
    direction: RX
    dummy_receiver: true
    after:
      delimiter: "\n"
    sequence:
      - lambda: |-
          std::string line(bytes.begin(), bytes.end());
          while (!line.empty() && (line.back() == '\n' || line.back() == '\r')) {
            line.pop_back();
          }

          if (line == "ALIVE") {
            id(last_alive_ms) = millis();
          }

          if (line.find("DB_VALVE,") == 0) {
            std::string db_valve_status = line.substr(9);
            if(db_valve_status == "OPEN") {
              id(db_valve_open) = true;
              id(db_valve_state).publish_state(true);
            }
            else if(db_valve_status == "CLOSED") {
              id(db_valve_open) = false;
              id(db_valve_state).publish_state(false);
            }
          }

          if (line.find("EF_VALVE,") == 0) {
            std::string ef_valve_status = line.substr(9);
            if(ef_valve_status == "OPEN") {
              id(ef_valve_open) = true;
              id(ef_valve_state).publish_state(true);
            }
            else if(ef_valve_status == "CLOSED") {
              id(ef_valve_open) = false;
              id(ef_valve_state).publish_state(false);
            }
          }

          // Handle CAL messages
          if (line.find("CAL,NUTRIENT_PUMP,") == 0) {
            std::string cal_data = line.substr(18); // Remove "CAL,NUTRIENT_PUMP,";
            if (cal_data == "COMPLETE") {
              id(set_pump_calibration_status_off).execute();
            }
          }

          if (line.find("CAL,SCALE,") == 0) {
            id(ef_scale_is_calibrating).publish_state(1);
            std::string cal_data = line.substr(10); // Remove "CAL,SCALE,"
            
            if (cal_data == "START") {
              id(calibration_status).publish_state("Starter");
            } 
            else if (cal_data == "TARING") {
              id(calibration_status).publish_state("Nullstiller");
            } 
            else if (cal_data == "ZERO_APPLIED") {
              id(calibration_status).publish_state("Nullpunkt funnet");
            } 
            else if (cal_data == "ACTIVE") {
              id(calibration_status).publish_state("Aktiv");
            } 
            else if (cal_data == "STOP") {
              id(calibration_status).publish_state("Inaktiv");
              id(ef_scale_is_calibrating).publish_state(0);

            } 
            else if (cal_data.find("WEIGHT=") == 0) {
              // Live weight reading during calibration
              float weight = 0.0;
              if (sscanf(cal_data.c_str(), "WEIGHT=%f", &weight) == 1) {
                id(calibration_weight).publish_state(weight);
              }
            }
            return;
          }

          if (line.find("STAT,") == 0) {
            char mainReservoirStatus[8] = {0};
            int mainInletValveOpen = 0;
            float dutchBucketReservoirWeight = 0.0f;
            int dutchBucketInletValveOpen = 0;
            int dutchBucketReservoirEmpty = 0;
            int dutchBuckeNutrientValveOpen = 0;
            float ebbFlowReservoirWeight = 0.0f;
            int ebbFlowInletValveOpen = 0;
            int ebbFlowReservoirEmpty = 0;
            int ebbFlowNutrientValveOpen=0;
            int scaleIsCalibrating = 0;
            float mainReservoirFlowRate = 0.0f;

            int matched = sscanf(
              line.c_str(),
              "STAT,MR_Status=%10[^,],MR_IV_O=%d,DB_Weight=%f,DB_IV_O=%d,EF_Weight=%f,EF_IV_O=%d,MR_IV_Flow=%f,EF_NV_O=%d,DB_NV_O=%d",
              mainReservoirStatus, 
              &mainInletValveOpen, 
              &dutchBucketReservoirWeight, 
              &dutchBucketInletValveOpen, 
              &ebbFlowReservoirWeight, 
              &ebbFlowInletValveOpen,
              &mainReservoirFlowRate,
              &ebbFlowNutrientValveOpen,
              &dutchBucketNutrientValveOpen
            );
            if (matched == 9) {
              id(main_reservoir_status).publish_state(mainReservoirStatus);
              id(main_inlet_valve_status).publish_state(mainInletValveOpen);
              id(dutch_bucket_reservoir_weight).publish_state(dutchBucketReservoirWeight);
              id(dutch_bucket_inlet_valve_status).publish_state(dutchBucketInletValveOpen);
              id(ebb_flow_reservoir_weight).publish_state(ebbFlowReservoirWeight);
              id(ebb_flow_inlet_valve_status).publish_state(ebbFlowInletValveOpen);
              id(main_reservoir_flow_rate).publish_state(mainReservoirFlowRate);
              id(ebb_flow_nutrient_valve_status).publish_state(ebbFlowNutrientValveOpen);
              id(dutch_bucket_nutrient_valve_status).publish_state(dutchBucketNutrientValveOpen);
            }
            else {
              ESP_LOGW("uart", "STAT parse failed, matched=%d, line=%s", matched, line.c_str());
            }
          }
            

script:
  - id: set_pump_calibration_status_on
    then:
      - homeassistant.service:
          service: input_boolean.turn_on
          data:
            entity_id: input_boolean.drivhus_pumpekalibrering_pagar

  - id: set_pump_calibration_status_off
    then:
      - homeassistant.service:
          service: input_boolean.turn_off
          data:
            entity_id: input_boolean.drivhus_pumpekalibrering_pagar

