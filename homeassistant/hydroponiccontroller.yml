switch:
  - platform: template
    name: "Hovedinntaksventil"
    optimistic: true
    turn_on_action: 
      - uart.write: "OPEN_MAIN_VALVE\r\n"
    turn_off_action: 
      - uart.write: "CLOSE_MAIN_VALVE\r\n"

  - platform: template
    name: "EF inntaksventil"
    id: "ef_valve"
    optimistic: true
    lambda: |-
      return id(ef_valve_open);
    turn_on_action: 
      - uart.write: "OPEN_EF_VALVE\r\n"
    turn_off_action: 
      - uart.write: "CLOSE_EF_VALVE\r\n"

  - platform: template
    name: "DB inntaksventil"
    id: "db_valve"
    optimistic: true
    lambda: |-
      return id(db_valve_open);
    turn_on_action: 
      - uart.write: "OPEN_DB_VALVE\r\n"
    turn_off_action: 
      - uart.write: "CLOSE_DB_VALVE\r\n"

  - platform: template
    name: "EF gjødningsventil"
    id: "ef_nutrient_valve"
    optimistic: true
    turn_on_action: 
      - uart.write: "OPEN_NUTRIENT_VALVE,EF"
    turn_off_action: 
      - uart.write: "CLOSE_NUTRIENT_VALVE,EF"

  - platform: template
    name: "DB gjødningsventil"
    id: "db_nutrient_valve"
    optimistic: true
    turn_on_action: 
      - uart.write: "OPEN_NUTRIENT_VALVE,DB"
    turn_off_action: 
      - uart.write: "CLOSE_NUTRIENT_VALVE,DB"
        
  - platform: template
    name: "Kalibrer DB vekt"
    icon: mdi:knob
    optimistic: true
    turn_on_action:
      - uart.write: "START_DB_SCALECAL\r\n"
    turn_off_action:
      - uart.write: "STOP_DB_SCALECAL\r\n"

  - platform: template
    name: "Kalibrer EF vekt"
    icon: mdi:knob
    optimistic: true
    turn_on_action:
      - uart.write: "START_EF_SCALECAL"
    turn_off_action:
      - uart.write: "STOP_EF_SCALECAL\r\n"

button:
  - platform: template
    name: "Kalibrer FloraGrow pumpe"
    icon: mdi:pump
    on_press:
      - homeassistant.service:
          service: input_boolean.turn_on
          data:
            entity_id: input_boolean.drivhus_pumpekalibrering_pagar
      - uart.write:
          data: !lambda |-
            int time = (int) id(nutrient_pump_calibration_time).state * 1000;
            int speed = (int) id(nutrient_pump_floragrow_speed).state;
            std::string message = str_sprintf("CAL_NUTRIENT_PUMP,FLORA_GROW,%d,%d\r\n", time, speed);
            return std::vector<uint8_t>(message.begin(), message.end());

